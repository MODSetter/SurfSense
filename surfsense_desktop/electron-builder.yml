appId: com.surfsense.desktop
productName: SurfSense
publish:
  provider: github
  owner: MODSetter
  repo: SurfSense
directories:
  output: release
files:
  - dist/**/*
  - "!node_modules"
  - node_modules/uiohook-napi/**/*
  - "!node_modules/uiohook-napi/src"
  - "!node_modules/uiohook-napi/libuiohook"
  - "!node_modules/uiohook-napi/binding.gyp"
  - node_modules/node-gyp-build/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/node-mac-permissions/**/*
  - "!node_modules/node-mac-permissions/src"
  - "!node_modules/node-mac-permissions/binding.gyp"
  - "!src"
  - "!scripts"
  - "!release"
extraResources:
  - from: ../surfsense_web/.next/standalone/surfsense_web/
    to: standalone/
    filter:
      - "**/*"
      - "!**/node_modules"
  - from: ../surfsense_web/.next/standalone/surfsense_web/node_modules/
    to: standalone/node_modules/
    filter: ["**/*"]
  - from: ../surfsense_web/.next/static/
    to: standalone/.next/static/
    filter: ["**/*"]
  - from: ../surfsense_web/public/
    to: standalone/public/
    filter: ["**/*"]
asarUnpack:
  - "**/*.node"
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/node-mac-permissions/**/*"
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  artifactName: "${productName}-${version}-${arch}.${ext}"
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSInputMonitoringUsageDescription: "SurfSense uses input monitoring to provide system-wide autocomplete suggestions as you type."
    NSAccessibilityUsageDescription: "SurfSense uses accessibility features to read text fields and insert suggestions."
    NSAppleEventsUsageDescription: "SurfSense uses Apple Events to read text from the active application and insert autocomplete suggestions."
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  icon: assets/icon.png
  category: Utility
  artifactName: "${productName}-${version}-${arch}.${ext}"
  mimeTypes:
    - x-scheme-handler/surfsense
  desktop:
    entry:
      Name: SurfSense
      Comment: AI-powered research assistant
      Categories: Utility;Office;
  target:
    - deb
    - AppImage
