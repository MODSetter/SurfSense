appId: com.surfsense.desktop
productName: SurfSense
publish:
  provider: github
  owner: MODSetter
  repo: SurfSense
directories:
  output: release
files:
  - dist/**/*
  - "!node_modules"
  - "!src"
  - "!scripts"
  - "!release"
extraResources:
  - from: ../surfsense_web/.next/standalone/
    to: standalone/
    filter:
      - "**/*"
      - "!node_modules"
  - from: ../surfsense_web/.next/standalone/node_modules/
    to: standalone/node_modules/
    filter: ["**/*"]
  - from: ../surfsense_web/.next/standalone/.next/
    to: standalone/.next/
    filter: ["**/*"]
  - from: ../surfsense_web/.next/static/
    to: standalone/.next/static/
    filter: ["**/*"]
  - from: ../surfsense_web/public/
    to: standalone/public/
    filter: ["**/*"]
asarUnpack:
  - "**/*.node"
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  artifactName: "${productName}-${version}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
linux:
  icon: assets/icon.png
  category: Utility
  artifactName: "${productName}-${version}-${arch}.${ext}"
  desktop:
    Name: SurfSense
    Comment: AI-powered research assistant
    Categories: Utility;Office;
    MimeType: x-scheme-handler/surfsense;
  target:
    - deb
    - AppImage
