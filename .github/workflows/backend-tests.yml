name: Backend Tests

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'surfsense_backend/**'
              - '.github/workflows/backend-tests.yml'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event.pull_request.draft == false && needs.changes.outputs.backend == 'true' }}
    env:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            surfsense_backend/.venv
          key: python-deps-${{ hashFiles('surfsense_backend/uv.lock') }}
          restore-keys: |
            python-deps-

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ env.EMBEDDING_MODEL }}

      - name: Install dependencies
        working-directory: surfsense_backend
        run: uv sync

      - name: Run unit tests
        working-directory: surfsense_backend
        run: uv run pytest -m unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event.pull_request.draft == false && needs.changes.outputs.backend == 'true' }}
    env:
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: surfsense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d surfsense_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            surfsense_backend/.venv
          key: python-deps-${{ hashFiles('surfsense_backend/uv.lock') }}
          restore-keys: |
            python-deps-

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ env.EMBEDDING_MODEL }}

      - name: Install dependencies
        working-directory: surfsense_backend
        run: uv sync

      - name: Run integration tests
        working-directory: surfsense_backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/surfsense_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ETL_SERVICE: DOCLING
        run: uv run pytest -m integration

  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [changes, unit-tests, integration-tests]
    if: always()

    steps:
      - name: Check all test jobs
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "Backend change detection failed"
            exit 1
          fi

          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo "Draft PR; backend tests skipped"
            exit 0
          fi

          if [[ "${{ needs.changes.outputs.backend }}" != "true" ]]; then
            echo "No backend changes detected; backend tests skipped"
            exit 0
          fi

          if [[ "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Backend tests failed"
            exit 1
          else
            echo "All backend tests passed"
          fi
